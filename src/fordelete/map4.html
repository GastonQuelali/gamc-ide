            vertical-align: middle;
        }

            .switch input {
                opacity: 0;
                width: 0;
                height: 0;
            }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            -webkit-transition: 0.4s;
            transition: 0.4s;
        }

            .slider:before {
                position: absolute;
                content: "";
                height: 20px;
                width: 20px;
                left: 3px;
                bottom: 1px;
                background-color: white;
                -webkit-transition: 0.4s;
                transition: 0.4s;
            }

        input:checked + .slider {
            background-color: #2196f3;
        }

        input:focus + .slider {
            box-shadow: 0 0 1px #2196f3;
        }

        input:checked + .slider:before {
            -webkit-transform: translateX(20px);
            -ms-transform: translateX(20px);
            transform: translateX(20px);
        }

        /* Rounded sliders */

        .slider.round {
            border-radius: 20px;
        }

            .slider.round:before {
                border-radius: 50%;
            }

                    distanceButton.classList.remove("active");
                    areaButton.classList.add("active");
                }

                function clearMeasurements() {
                    distanceButton.classList.remove("active");
                    areaButton.classList.remove("active");
                    measurement.clear();
                }
                //FIN MEASUREMENT

                const toolbarDiv = document.getElementById("toolbarDiv");
                const eToolbar = new Expand({
                    view: view,
                    content: toolbarDiv,
                    expandIconClass: "esri-icon-measure",
                    expanded: false
                });

                loadToolbar();

                function loadToolbar() {
                    if (eToolbar.expanded == false)
                        toolbarDiv.style.display = "block";
                    else
                        toolbarDiv.style.display = "none";
                };

                /*eToolbar.on("click", function (event) {
                    console.log("Results of the click expand: ", event);
                });*/

                /*view.eToolbar.on("click", function (event) {
                    console.log("hola logfdafds" + event);
                });*/
                //toolbarDiv.style.display = "block";
                view.ui.add(eToolbar, "top-left");
                view.ui.add(eSearch, "top-right");
                view.ui.add(eCoordinate, "top-right");
                view.ui.add(eLayerList, "bottom-left");
                view.ui.add(elegend, "bottom-right");
                view.ui.add(eBasemapGallery, "bottom-right");
            });

            // FUNCIONES OPERABLES
            function defineActions(event) {
                var item = event.item;
                item.actionsSections = [
                    [
                        {
                            title: "Aumentar la opacidad",
                            className: "esri-icon-up",
                            id: "increase-opacity"
                        },
                        {
                            title: "Disminuir la opacidad",
                            className: "esri-icon-down",
                            id: "decrease-opacity"
                        }
                    ]
                ];
            }

            function cargarLayer(url) {
                var layer1 = new MapImageLayer(url);
                map.layers.add(layer1);
                return layer1;
            }

            function cargarBaseMap(vUrl, vYear) {
                var tileLayer1 = new TileLayer({ url: vUrl, visible: true, title: vYear, copyright: vCopyright });
                var baseMap1 = new Basemap({
                    baseLayers: [tileLayer1],
                    title: vYear,
                    id: vYear,
                    thumbnailUrl: vUrl + "/info/thumbnail"
                });
                return baseMap1;
            }
            // FIN FUNCIONES OPERABLES
        });
    </script>
</head>

    <div id="appContainer">
        <div id="viewDiv"></div>
        <div id="infoDiv" class="esri-component esri-home esri-widget--button esri-widget" role="button"
             title="Limpiar Mapa base">
            <span aria-hidden="true" class="esri-icon esri-icon-maps"></span>
            <span class="esri-icon-font-fallback-text">Clean</span>
        </div>
        <div id="toolbarDiv" class="esri-widget">
            <button id="distance" class="esri-widget--button esri-interactive esri-icon-measure-line"
                    title="Distance Measurement Tool"></button>
            <button id="area" class="esri-widget--button esri-interactive esri-icon-measure-area"
                    title="Area Measurement Tool"></button>
            <button id="clear" class="esri-widget--button esri-interactive esri-icon-trash" title="Clear Measurements"></button>
        </div>
    </div>
</body>
