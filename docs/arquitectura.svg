<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .box { fill: #f8fafc; stroke: #3b82f6; stroke-width: 2; rx: 8; }
      .title { font-size: 14px; font-weight: bold; fill: #1e293b; }
      .subtitle { font-size: 12px; fill: #64748b; }
      .arrow { stroke: #3b82f6; stroke-width: 2; marker-end: url(#arrowhead); }
      .arrow-label { font-size: 10px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">
    Arquitectura del Sistema GAMC-IDE
  </text>
  
  <!-- Frontend -->
  <rect x="50" y="80" width="200" height="120" class="box"/>
  <text x="150" y="105" text-anchor="middle" class="title">Frontend</text>
  <text x="150" y="125" text-anchor="middle" class="subtitle">React + TypeScript</text>
  <text x="150" y="145" text-anchor="middle" class="subtitle">Tailwind CSS</text>
  <text x="150" y="165" text-anchor="middle" class="subtitle">ArcGIS Maps SDK</text>
  <text x="150" y="185" text-anchor="middle" class="subtitle">Recharts</text>
  
  <!-- Vite Proxy -->
  <rect x="280" y="110" width="80" height="60" class="box" stroke="#10b981"/>
  <text x="320" y="135" text-anchor="middle" class="title" font-size="11">Vite</text>
  <text x="320" y="155" text-anchor="middle" class="subtitle" font-size="10">Proxy</text>
  
  <!-- Backend -->
  <rect x="450" y="80" width="200" height="120" class="box"/>
  <text x="550" y="105" text-anchor="middle" class="title">Backend</text>
  <text x="550" y="125" text-anchor="middle" class="subtitle">FastAPI</text>
  <text x="550" y="145" text-anchor="middle" class="subtitle">Python</text>
  <text x="550" y="165" text-anchor="middle" class="subtitle">JWT Auth</text>
  <text x="550" y="185" text-anchor="middle" class="subtitle">REST API</text>
  
  <!-- Databases -->
  <rect x="450" y="250" width="100" height="70" class="box" stroke="#8b5cf6"/>
  <text x="500" y="280" text-anchor="middle" class="title" font-size="11">PostgreSQL</text>
  
  <rect x="565" y="250" width="100" height="70" class="box" stroke="#8b5cf6"/>
  <text x="615" y="280" text-anchor="middle" class="title" font-size="11">Elasticsearch</text>
  
  <rect x="565" y="340" width="100" height="70" class="box" stroke="#8b5cf6"/>
  <text x="615" y="370" text-anchor="middle" class="title" font-size="11">MinIO</text>
  
  <rect x="450" y="340" width="100" height="70" class="box" stroke="#8b5cf6"/>
  <text x="500" y="370" text-anchor="middle" class="title" font-size="11">ArcGIS Server</text>
  
  <!-- Arrows -->
  <line x1="250" y1="140" x2="275" y2="140" class="arrow"/>
  <line x1="360" y1="140" x2="445" y2="140" class="arrow"/>
  <line x1="500" y1="200" x2="500" y2="245" class="arrow"/>
  <line x1="540" y1="200" x2="540" y2="245" class="arrow"/>
  <line x1="565" y1="210" x2="565" y2="240" class="arrow"/>
  
  <!-- Pages -->
  <text x="400" y="450" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">
    Páginas del Sistema
  </text>
  
  <rect x="80" y="470" width="90" height="30" rx="4" fill="#e2e8f0"/>
  <text x="125" y="490" text-anchor="middle" font-size="10" fill="#475569">Login</text>
  
  <rect x="180" y="470" width="90" height="30" rx="4" fill="#e2e8f0"/>
  <text x="225" y="490" text-anchor="middle" font-size="10" fill="#475569">Dashboard</text>
  
  <rect x="280" y="470" width="90" height="30" rx="4" fill="#e2e8f0"/>
  <text x="325" y="490" text-anchor="middle" font-size="10" fill="#475569">Mapa</text>
  
  <rect x="380" y="470" width="90" height="30" rx="4" fill="#e2e8f0"/>
  <text x="425" y="490" text-anchor="middle" font-size="10" fill="#475569">Capas</text>
  
  <rect x="480" y="470" width="90" height="30" rx="4" fill="#3b82f6"/>
  <text x="525" y="490" text-anchor="middle" font-size="10" fill="#fff">Admin</text>
  
  <rect x="580" y="470" width="90" height="30" rx="4" fill="#e2e8f0"/>
  <text x="625" y="490" text-anchor="middle" font-size="10" fill="#475569">Config</text>
  
  <!-- Flow arrow -->
  <line x1="520" y1="210" x2="580" y2="300" class="arrow" stroke-dasharray="4"/>
  <line x1="540" y1="290" x2="615" y2="300" class="arrow"/>
  <line x1="500" y1="290" x2="500" y2="335" class="arrow"/>
</svg>
